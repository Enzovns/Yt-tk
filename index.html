<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT → TikTok FR</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a1a 100%);
      font-family: 'Syne', sans-serif;
      color: #f0e6ff;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(255,45,85,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,45,85,0.7); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    header {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: 1px; }
    .logo span { color: #ff2d55; }
    main { max-width: 680px; margin: 0 auto; padding: 36px 20px 60px; }
    h1 {
      font-weight: 800;
      font-size: clamp(24px, 7vw, 46px);
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f0e6ff, #ff2d55);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: rgba(240,230,255,0.4);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(240,230,255,0.4);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .field { margin-bottom: 20px; }
    input[type="url"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 14px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: #f0e6ff;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: #ff2d55;
      background: rgba(255,45,85,0.05);
      box-shadow: 0 0 0 3px rgba(255,45,85,0.1);
    }
    input::placeholder { color: rgba(240,230,255,0.25); }
    .tones { display: flex; gap: 8px; flex-wrap: wrap; }
    .tone-btn {
      flex: 1;
      min-width: 120px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(240,230,255,0.6);
      padding: 10px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .tone-btn.active {
      background: rgba(255,45,85,0.2);
      border-color: #ff2d55;
      color: #ff2d55;
      font-weight: 700;
    }
    #preview {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,45,85,0.2);
      position: relative;
      margin-bottom: 20px;
      display: none;
    }
    #preview img { width: 100%; display: block; max-height: 160px; object-fit: cover; }
    #preview-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 16px 12px 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }
    .main-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff2d55, #ff6b35);
      border: none;
      color: white;
      padding: 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
      animation: pulse-glow 2s infinite;
    }
    .main-btn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }
    .error {
      background: rgba(255,45,85,0.1);
      border: 1px solid rgba(255,45,85,0.3);
      border-radius: 6px;
      padding: 14px 16px;
      color: #ff6b6b;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      margin-top: 16px;
      display: none;
    }
    .spinner-wrap { text-align: center; padding: 40px 0; display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,45,85,0.2);
      border-top-color: #ff2d55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    .spinner-wrap p { font-family: 'Space Mono', monospace; font-size: 12px; color: rgba(240,230,255,0.4); }
    #results { margin-top: 32px; display: none; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .results-header span { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(240,230,255,0.4); }
    .section-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 18px 18px 18px 22px;
      margin-bottom: 12px;
      position: relative;
      animation: slide-up 0.4s ease forwards;
    }
    .section-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(to bottom, #ff2d55, #ff6b35);
      border-radius: 8px 0 0 8px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #ff2d55; text-transform: uppercase; }
    .card-content { font-family: 'Space Mono', monospace; font-size: 12px; line-height: 1.8; color: rgba(240,230,255,0.75); white-space: pre-wrap; }
    .copy-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(240,230,255,0.5);
      padding: 5px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .copy-btn.ok { background: rgba(50,215,75,0.2); color: #32d74b; border-color: #32d74b; }
    .copy-all {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(240,230,255,0.5);
      padding: 7px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      border-radius: 4px;
    }
    .warning {
      margin-top: 8px;
      padding: 12px 14px;
      background: rgba(255,165,0,0.06);
      border: 1px solid rgba(255,165,0,0.15);
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(255,165,0,0.6);
      line-height: 1.6;
    }
  </style>
</head>
<body>
<header>
  <div class="logo">YT<span>→</span>TikTok</div>
  <div style="font-family:'Space Mono',monospace;font-size:11px;color:rgba(240,230,255,0.4)">FRANÇAIS PAR IA</div>
</header>
<main>
  <h1>Colle ton lien YouTube.<br>Reposte en français.</h1>
  <p class="subtitle">Script · Sous-titres · Description · Hashtags</p>
  <div class="field">
    <label>Lien YouTube</label>
    <input type="url" id="yt-url" placeholder="https://youtube.com/watch?v=..." oninput="onUrlChange(this.value)" />
  </div>
  <div id="preview">
    <img id="preview-img" src="" alt="Aperçu" />
    <div id="preview-label">✓ Vidéo détectée</div>
  </div>
  <div class="field">
    <label>Ton du contenu</label>
    <div class="tones">
      <button class="tone-btn active" onclick="setTone(this,'🔥 Viral / Choc')">🔥 Viral</button>
      <button class="tone-btn" onclick="setTone(this,'😂 Fun / Décontracté')">😂 Fun</button>
      <button class="tone-btn" onclick="setTone(this,'📚 Éducatif')">📚 Éducatif</button>
      <button class="tone-btn" onclick="setTone(this,'🎭 Storytelling')">🎭 Story</button>
    </div>
  </div>
  <div style="margin-top:24px">
    <button class="main-btn" id="gen-btn" onclick="generate()">🚀 Générer le contenu TikTok</button>
  </div>
  <div class="error" id="error-box"></div>
  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    <p>L'IA adapte ta vidéo pour TikTok...</p>
  </div>
  <div id="results">
    <div class="results-header">
      <span>CONTENU GÉNÉRÉ</span>
      <button class="copy-all" onclick="copyAll()">Tout copier</button>
    </div>
    <div id="cards"></div>
    <div class="warning">⚠ L'IA ne peut pas regarder la vidéo directement. Adapte le script au contenu réel avant de poster.</div>
  </div>
</main>
<script>
  let currentTone = "🔥 Viral / Choc";
  let fullResult = "";
  function setTone(btn, tone) {
    document.querySelectorAll(".tone-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTone = tone;
  }
  function extractId(url) {
    const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
    return m ? m[1] : null;
  }
  function onUrlChange(val) {
    const id = extractId(val);
    const preview = document.getElementById("preview");
    if (id) {
      document.getElementById("preview-img").src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
      preview.style.display = "block";
    } else {
      preview.style.display = "none";
    }
  }
  function parseResult(text) {
    const sections = [];
    const lines = text.split("\n");
    let current = null;
    for (const line of lines) {
      const m = line.match(/^\*\*(.+?)\*\*/);
      if (m) {
        if (current) sections.push(current);
        current = { title: m[1], content: [] };
      } else if (current && line.trim()) {
        current.content.push(line.replace(/\*\*/g, ""));
      }
    }
    if (current) sections.push(current);
    return sections.length > 0 ? sections : [{ title: "Résultat", content: text.split("\n").filter(Boolean) }];
  }
  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = "✓";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = "Copier"; btn.classList.remove("ok"); }, 2000);
    });
  }
  function copyAll() {
    navigator.clipboard.writeText(fullResult);
  }
  async function generate() {
    const url = document.getElementById("yt-url").value.trim();
    if (!url) return;
    document.getElementById("error-box").style.display = "none";
    document.getElementById("results").style.display = "none";
    document.getElementById("spinner").style.display = "block";
    document.getElementById("gen-btn").disabled = true;
    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, tone: currentTone }),
      });
      const data = await res.json();
      if (data.error) {
        document.getElementById("error-box").textContent = "⚠ " + data.error;
        document.getElementById("error-box").style.display = "block";
      } else {
        fullResult = data.result;
        const sections = parseResult(data.result);
        const cards = document.getElementById("cards");
        cards.innerHTML = "";
        sections.forEach((s, i) => {
          const content = s.content.join("\n");
          const card = document.createElement("div");
          card.className = "section-card";
          card.style.animationDelay = `${i * 0.08}s`;
          card.innerHTML = `
            <div class="card-header">
              <div class="card-title">${s.title}</div>
              <button class="copy-btn" onclick="copyText(${JSON.stringify(content)}, this)">Copier</button>
            </div>
            <div class="card-content">${content}</div>
          `;
          cards.appendChild(card);
        });
        document.getElementById("results").style.display = "block";
      }
    } catch(e) {
      document.getElementById("error-box").textContent = "⚠ Erreur de connexion au serveur.";
      document.getElementById("error-box").style.display = "block";
    }
    document.getElementById("spinner").style.display = "none";
    document.getElementById("gen-btn").disabled = false;
  }
</script>
</body>
</html>
